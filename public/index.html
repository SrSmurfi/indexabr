<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>IndexaBR • Configuração</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
        :root {
            --bg-base: #0f172a;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .card {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 32px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .desc {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .section-label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        select, input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.6);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        select {
            height: 140px;
            margin-bottom: 20px;
        }

        select:focus, input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .api-field-wrapper {
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease-out;
        }

        .api-field-wrapper label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Torbox Banner */
        .torbox-banner {
            display: block;
            margin: 30px 0;
            padding: 20px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(139, 92, 246, 0.15));
            border: 1px solid rgba(139, 92, 246, 0.4);
            border-radius: 16px;
            text-decoration: none;
            color: #ffffff;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            text-align: center;
        }

        .torbox-banner::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-20deg);
            animation: shine 4s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        .torbox-banner:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.25);
            border-color: rgba(139, 92, 246, 0.8);
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(139, 92, 246, 0.2));
        }

        .torbox-banner-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .torbox-banner-desc {
            font-size: 0.85rem;
            color: #cbd5e1;
        }

        .torbox-badge {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #ffffff;
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 700;
            letter-spacing: 0.05em;
            box-shadow: 0 2px 10px rgba(16, 185, 129, 0.4);
        }

        #btnGerar {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), #2563eb);
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px var(--accent-glow);
        }

        #btnGerar:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.6);
        }

        #btnGerar:disabled {
            background: rgba(59, 130, 246, 0.2);
            color: rgba(255,255,255,0.4);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .result-box {
            display: none;
            margin-top: 24px;
            padding: 16px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 12px;
            color: #34d399;
            font-size: 0.85rem;
            word-break: break-all;
            text-align: center;
            line-height: 1.5;
        }

        #btnCopy {
            display: none;
            width: 100%;
            margin-top: 12px;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: #10b981;
            color: white;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        #btnCopy:hover {
            background: #059669;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="logo">🎬</div>
            <h1>IndexaBR</h1>
            <p class="desc">A potência dos streams brasileiros no seu Stremio</p>
        </div>

        <div id="sectionDebrid">
            <div class="section-label">Selecione seu serviço Debrid</div>
            <select id="debrids" multiple>
                <option value="torbox">🔵 TorBox</option>
                <option value="realdebrid">🟡 Real-Debrid</option>
                <option value="alldebrid">🔴 AllDebrid</option>
                <option value="premiumize">🟣 Premiumize</option>
                <option value="debridlink">🟢 Debrid-Link</option>
                <option value="offcloud">🧡 Offcloud</option>
            </select>
            <div id="apiFields"></div>
        </div>

        <a href="https://torbox.app/subscription?referral=b08bcd10-8df2-44c9-a0ba-4d5bdb62ef96" target="_blank" class="torbox-banner">
            <div class="torbox-banner-title">
                🔵 Conheça o TorBox <span class="torbox-badge">7 DIAS GRÁTIS</span>
            </div>
            <div class="torbox-banner-desc">O Debrid mais rápido e moderno do mercado. Clique e crie sua conta agora!</div>
        </a>

        <button id="btnGerar" onclick="gerar()" disabled>Gerar Meu Link Addon</button>

        <div id="result" class="result-box"></div>
        <button id="btnCopy" onclick="copiar()">📋 Copiar Link</button>
    </div>

    <script>
        let finalLink = '';
        const debrids   = document.getElementById('debrids');
        const apiFields = document.getElementById('apiFields');
        const btnGerar  = document.getElementById('btnGerar');

        debrids.addEventListener('change', () => {
            const selected = Array.from(debrids.selectedOptions).map(o => o.value);
            if (selected.length > 2) {
                alert('Máximo 2 serviços debrid simultâneos.');
                debrids.selectedOptions[debrids.selectedOptions.length - 1].selected = false;
                return;
            }

            apiFields.innerHTML = selected.map(s => `
                <div class="api-field-wrapper">
                    <label>API Key — ${getDebridLabel(s)}</label>
                    <input type="text" id="api_${s}" placeholder="Cole aqui seu Token / API Key" oninput="validar()">
                </div>
            `).join('');
            validar();
        });

        function getDebridLabel(key) {
            const map = {
                realdebrid: '🟡 Real-Debrid',
                torbox: '🔵 TorBox',
                alldebrid: '🔴 AllDebrid',
                premiumize: '🟣 Premiumize',
                debridlink: '🟢 Debrid-Link',
                offcloud: '🧡 Offcloud'
            };
            return map[key] || key.toUpperCase();
        }

        function validar() {
            const inputs = Array.from(apiFields.querySelectorAll('input'));
            btnGerar.disabled = inputs.length === 0 || !inputs.every(i => i.value.length > 5);
        }

        async function gerar() {
            btnGerar.innerText = 'Gerando...';
            btnGerar.disabled = true;

            try {
                // UI no longer provides P2P. We force torrentOnly: false
                const body = { torrentOnly: false }; 
                
                const selected = Array.from(debrids.selectedOptions).map(o => o.value);
                selected.forEach(s => {
                    const val = document.getElementById(`api_${s}`)?.value.trim();
                    if (val) body[s] = val;
                });

                const res  = await fetch('/gerar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();

                if (!data.id) {
                    throw new Error('Erro ao gerar addon: ID vazio');
                }

                finalLink = data.manifestUrl;

                document.getElementById('result').innerText  = finalLink;
                document.getElementById('result').style.display = 'block';
                document.getElementById('btnCopy').style.display = 'block';
                btnGerar.innerText = '✅ Link Gerado!';
            } catch (err) {
                btnGerar.innerText = '❌ Erro — Tente novamente';
                btnGerar.disabled = false;
                console.error(err);
            }
        }

        function copiar() {
            navigator.clipboard.writeText(finalLink).then(() => {
                const btn = document.getElementById('btnCopy');
                const oldText = btn.innerText;
                btn.innerText = '✅ Copiado com sucesso!';
                btn.style.background = '#059669';
                setTimeout(() => {
                    btn.innerText = oldText;
                    btn.style.background = '#10b981';
                }, 2000);
            });
        }
    </script>
</body>
</html>
